<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>DYRECTIO · SlabHub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:opsz,wght@12..72,400;12..72,500;12..72,600;12..72,700&display=swap');

:root{
  color-scheme:dark;
  --font-sans:'Instrument Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Consolas,monospace;
  --bg:#09080d; --surface:#111016; --surface2:#17161d; --surface3:#1e1d25; --surface4:#26242e;
  --s1:var(--surface); --s2:var(--surface2); --s3:var(--surface3); --s4:var(--surface4);
  --border:#292731; --border2:#3a3744; --line-soft:rgba(255,255,255,.06);
  --text:#f7f6f8; --text2:#a7a3ad; --text3:#6f6a78; --muted:var(--text3);
  --silver:#c9c6ce; --accent:#8d78ff; --accent-rgb:141,120,255; --accent-dim:rgba(var(--accent-rgb),.12);
  --company-color:var(--accent); --company-dim:var(--accent-dim);
  --green:#55d98a; --yellow:#e7bf66; --orange:#e98a51; --purple:#b18cff; --red:#ef6868; --accent2:#6e9fd0;
  --todo:#85818c; --inprogress:var(--yellow); --done:var(--green); --incomplete:var(--orange); --missingfiles:var(--purple);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px; --space-7:32px; --space-8:40px; --space-9:48px; --space-10:64px;
  --radius-xs:6px; --radius-sm:10px; --radius-md:14px; --radius-lg:18px; --radius-xl:24px; --radius-pill:999px;
  --r:var(--radius-sm); --r2:var(--radius-md); --sidebar:244px;
  --shadow-1:0 1px 2px rgba(0,0,0,.28),0 10px 28px rgba(0,0,0,.16);
  --shadow-2:0 18px 60px rgba(0,0,0,.42);
  --ease:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{background:radial-gradient(circle at 18% -10%,rgba(79,58,124,.16),transparent 28%),var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button,input,select,textarea{font:inherit} button{color:inherit}
::selection{background:var(--accent-dim);color:var(--text)}

/* DYRECTIO brand */
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-mark,.header-left h1{font-weight:700;letter-spacing:-.035em}
.logo-mark{font-size:18px}.logo-mark span,.header-left h1 span{color:var(--company-color)}
.logo-sub,.header-sub{font-family:var(--font-mono);font-size:9px;line-height:1.5;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:5px}

/* layout */
#app-body{display:flex;min-height:100vh} #main{flex:1;min-width:0}
#sidebar{width:var(--sidebar);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;background:rgba(17,16,22,.86);backdrop-filter:blur(20px);border-right:1px solid var(--border);overflow-y:auto}
.sb-section{padding:22px 14px 7px;font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--text3)}
.sb-nav{display:flex;flex-direction:column;gap:4px;padding:0 10px}.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border:0;border-radius:10px;background:transparent;color:var(--text2);font-size:13px;font-weight:550;text-align:left;cursor:pointer;transition:.18s var(--ease)}
.sb-item:hover{background:var(--surface2);color:var(--text)}.sb-item.active{background:var(--company-dim);color:var(--company-color);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--company-color) 20%,transparent)}
.sb-icon{width:17px;height:17px;opacity:.74}.sb-item.active .sb-icon{opacity:1}.sb-badge{margin-left:auto;padding:2px 7px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.sb-item.active .sb-badge{background:var(--company-color);color:#fff}.sb-spacer{flex:1}.sb-footer{padding:12px;border-top:1px solid var(--border)}
.conn-pill,#conn-status{display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface2);border-radius:999px;padding:7px 10px;color:var(--text3);font-family:var(--font-mono);font-size:9px}.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}.conn-dot.live,.status-dot{background:var(--green);box-shadow:0 0 0 4px rgba(85,217,138,.08)}

.page,.main-panel,main{padding:34px 40px 56px;max-width:1180px}.page{display:none}.page.active,.main-panel.active,.company-panel.active{display:block;animation:fadeIn .24s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ph,header{margin-bottom:30px}.ph h1,.header-left h1{font-size:clamp(28px,3vw,40px);line-height:1.04;font-weight:700;letter-spacing:-.045em}.ph p{font-size:14px;color:var(--text2);margin-top:8px}.ph-row,header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
header{padding:28px 32px 22px;border-bottom:1px solid var(--border);margin-bottom:0}.header-right{display:flex;align-items:center;gap:8px}

/* cards */
.card,.card-sm,.stat-card,.stat,.fin-card,.split-card,.train-cal-wrap,.profile-block,.target-card,.tracker-sum-card{background:linear-gradient(180deg,rgba(255,255,255,.018),transparent),var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-1)}
.card{border-radius:var(--radius-md);padding:20px}.card-sm{border-radius:var(--radius-sm);padding:15px 16px}
.stats-grid,.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}.stat-card,.stat{border-radius:var(--radius-md);padding:18px;min-height:112px}.stat-label,.fin-label,.target-label,.tracker-sum-label{font-family:var(--font-mono);font-size:9px;line-height:1.4;font-weight:500;text-transform:uppercase;letter-spacing:.11em;color:var(--text3);margin-bottom:10px}.stat-num,.fin-amount,.target-num,.tracker-sum-num{font-size:30px;line-height:1;font-weight:650;letter-spacing:-.045em}.stat-sub,.target-sub{font-size:11px;color:var(--text2);margin-top:9px}.progress-bar,.stat-bar-inner,.progress-row{height:3px;background:var(--surface4);border-radius:999px;margin-top:12px;overflow:hidden}.progress-fill,.stat-bar-fill{height:100%;border-radius:inherit;background:var(--company-color)}

/* controls */
.add-row,.add-section,.sub-add-row,.add-subtask-row{display:flex;align-items:center;gap:10px}.add-row,.add-section{margin-bottom:18px}.add-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px}
.add-input,.add-section input,.sub-add-row input,.add-subtask-row input,.modal-note,.task-name-edit,.subtask-name-edit,.edit-inp,.sel,.status-select,.fin-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);outline:none;transition:.18s var(--ease)}
.add-input,.add-section input,.sub-add-row input,.add-subtask-row input,.modal-note,.task-name-edit,.subtask-name-edit,.edit-inp{border-radius:10px;padding:11px 13px;font-size:13px}.add-input,.add-section input{flex:1;min-width:0}.add-section input{background:transparent;border-color:transparent}.add-input:focus,.add-section input:focus,.sub-add-row input:focus,.add-subtask-row input:focus,.modal-note:focus,.task-name-edit:focus,.subtask-name-edit:focus,.edit-inp:focus,.sel:focus,.status-select:focus,.fin-select:focus{border-color:var(--company-color);box-shadow:0 0 0 3px var(--company-dim)}
::placeholder{color:var(--text3)}.sel,.status-select,.fin-select{border-radius:8px;padding:7px 9px;font-size:11px;font-weight:600}
.btn-primary,.btn-add,.btn-sub,.btn-ghost,#backoffice-btn{border-radius:10px;padding:10px 14px;font-size:12px;font-weight:650;cursor:pointer;transition:.18s var(--ease);white-space:nowrap}.btn-primary,.btn-add{border:1px solid color-mix(in srgb,var(--company-color) 72%,white 8%);background:var(--company-color);color:#fff;box-shadow:0 8px 20px color-mix(in srgb,var(--company-color) 18%,transparent)}.btn-primary:hover,.btn-add:hover{transform:translateY(-1px);filter:brightness(1.06)}.btn-ghost,.btn-sub,#backoffice-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover,.btn-sub:hover,#backoffice-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface3)}
.ibtn,.icon-btn,.cal-nav button,.tracker-month-nav button{display:inline-grid;place-items:center;background:transparent;border:0;color:var(--text3);cursor:pointer;border-radius:8px;transition:.18s}.ibtn:hover,.icon-btn:hover,.cal-nav button:hover,.tracker-month-nav button:hover{background:var(--surface3);color:var(--text)}

/* task system */
.task-list,.tasks-list{display:flex;flex-direction:column;gap:8px}.task-row,.task-item{display:flex;align-items:center;gap:12px;padding:14px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);transition:.16s var(--ease)}.task-row:hover,.task-item:hover{background:var(--surface2);border-color:var(--border2)}
.task-row.s-inprogress,.task-item.status-inprogress{border-left:2px solid var(--inprogress)}.task-row.s-done,.task-item.status-done{border-left:2px solid var(--done)}.task-row.s-incomplete,.task-item.status-incomplete{border-left:2px solid var(--incomplete)}.task-row.s-missingfiles,.task-item.status-missingfiles{border-left:2px solid var(--missingfiles)}.task-row.s-todo,.task-item.status-todo{border-left:2px solid var(--border2)}
.task-name{flex:1;min-width:0;font-size:14px;font-weight:520;line-height:1.45;overflow-wrap:anywhere}.s-done .task-name,.status-done .task-name{text-decoration:line-through;color:var(--text3)}.task-meta{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}.task-date{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.badge,.status-badge,.fin-status,.blocked-badge,.profile-stat-pill,.urgent-pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}.badge-todo{background:rgba(133,129,140,.12);color:var(--todo)}.badge-inprogress{background:rgba(231,191,102,.13);color:var(--inprogress)}.badge-done{background:rgba(85,217,138,.12);color:var(--done)}.badge-incomplete{background:rgba(233,138,81,.13);color:var(--incomplete)}.badge-missingfiles{background:rgba(177,140,255,.13);color:var(--missingfiles)}.badge-project{background:var(--surface3);color:var(--text2)}
.exp-btn,.expand-btn{display:flex;align-items:center;gap:4px;background:transparent;border:0;color:var(--text3);cursor:pointer}.exp-count,.sub-count{min-width:20px;text-align:center;padding:2px 6px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:9px}.exp-arrow,.arrow{transition:transform .2s}.open .exp-arrow,.expand-btn.open .arrow{transform:rotate(90deg)}
.subtask-panel,.subtasks-panel{max-height:0;overflow:hidden;background:var(--surface2);border:1px solid var(--border);border-top:0;border-radius:0 0 var(--radius-md) var(--radius-md);transition:max-height .28s var(--ease),padding .28s var(--ease)}.subtask-panel.open,.subtasks-panel.open{max-height:1400px;padding:12px 14px 14px 30px}.open-top,.has-subtasks-open>.task-item{border-radius:var(--radius-md) var(--radius-md) 0 0;border-bottom-color:transparent}.sub-row,.subtask-item{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;font-size:12px;margin-bottom:6px}.sub-name,.subtask-name{flex:1;min-width:0;overflow-wrap:anywhere}

/* tabs */
.tabs,.main-tabs,.tracker-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}.tab,.tab-btn,.main-tab,.tracker-tab{border:0;border-bottom:2px solid transparent;background:transparent;color:var(--text3);padding:11px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}.tab:hover,.tab-btn:hover,.main-tab:hover,.tracker-tab:hover{color:var(--text)}.tab.active,.tab-btn.active,.main-tab.active,.tracker-tab.active{color:var(--company-color);border-bottom-color:var(--company-color)}.tab-count{padding:2px 6px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:9px}.active>.tab-count,.tab.active .tab-count{background:var(--company-color);color:#fff}

/* finance & calendars */
.fin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:22px}.fin-card{border-radius:var(--radius-md);padding:18px}.fin-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line-soft)}.fin-row:last-child{border:0}.fin-name{flex:1;font-size:13px}.fin-client,.fin-date{font-family:var(--font-mono);font-size:9px;color:var(--text3)}.fin-amt{font-weight:650}.pos{color:var(--green)}.neg{color:var(--red)}
.train-cal-wrap{border-radius:var(--radius-lg);padding:20px;margin-bottom:22px}.cal-header,.tracker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.cal-title,.tracker-title{font-weight:650}.cal-nav,.tracker-month-nav{display:flex;gap:6px}.cal-nav button,.tracker-month-nav button{width:32px;height:32px;border:1px solid var(--border);background:var(--surface2)}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.cal-dow{text-align:center;font-family:var(--font-mono);font-size:8px;color:var(--text3);text-transform:uppercase;padding:6px}.cal-day{aspect-ratio:1;display:grid;place-items:center;border:1px solid transparent;border-radius:10px;font-size:11px;cursor:pointer;position:relative}.cal-day:hover:not(.empty):not(.future){background:var(--surface2);border-color:var(--border)}.cal-day.today{border-color:var(--border2)}.split-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.split-card{border-radius:var(--radius-md);padding:16px}.split-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.split-btn{padding:13px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-weight:650;cursor:pointer}

/* modal sheet */
.modal-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;background:rgba(3,2,6,.72);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:.22s}.modal-overlay.open{opacity:1;pointer-events:auto}.modal{width:min(100%,520px);padding:12px 22px 26px;background:var(--surface);border:1px solid var(--border2);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:var(--shadow-2);transform:translateY(24px);transition:.28s var(--ease)}.modal-overlay.open .modal{transform:none}.modal-handle{width:38px;height:4px;border-radius:99px;background:var(--border2);margin:0 auto 18px}.modal-title{font-size:18px;font-weight:650;margin-bottom:12px}.modal-date{padding:10px 12px;border-radius:10px;background:var(--surface2);font-size:12px;color:var(--text2);margin-bottom:14px}.modal-actions{display:flex;justify-content:flex-end;gap:8px}

/* CSV import visual component */
.csv-import{margin-bottom:22px;padding:18px;border:1px dashed color-mix(in srgb,var(--company-color) 42%,var(--border));border-radius:var(--radius-lg);background:linear-gradient(180deg,var(--company-dim),transparent 72%),var(--surface);display:flex;align-items:center;justify-content:space-between;gap:18px}.csv-import__copy{display:flex;align-items:flex-start;gap:12px}.csv-import__icon{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;background:var(--company-dim);color:var(--company-color);font-family:var(--font-mono);font-weight:600}.csv-import h3{font-size:14px;font-weight:650}.csv-import p{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.45}.csv-import input[type=file]{position:absolute;inline-size:1px;block-size:1px;opacity:0;pointer-events:none}.csv-import__button{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border:1px solid var(--border2);border-radius:10px;background:var(--surface2);font-size:12px;font-weight:650;cursor:pointer}.csv-import__button:hover{border-color:var(--company-color);color:var(--company-color)}

/* tracker */
.profile-block{border-radius:var(--radius-md);overflow:hidden}.profile-block-header,.content-type-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid var(--border)}.profile-block-name{font-weight:650}.days-grid{display:flex;flex-wrap:wrap;gap:5px;flex:1}.day-btn{width:27px;height:27px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-family:var(--font-mono);font-size:9px;font-weight:600;cursor:pointer}.day-btn:hover{border-color:var(--company-color);color:var(--company-color)}.day-btn.published{background:var(--company-color);border-color:var(--company-color);color:#0b0a0e}.day-btn.today{box-shadow:0 0 0 2px var(--company-dim)}

/* mobile */
#bottom-nav{display:none}.bn-inner{display:flex}.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:0;background:transparent;color:var(--text3);font-family:var(--font-mono);font-size:8px;text-transform:uppercase}.bn-item.active{color:var(--company-color)}.bn-item svg{width:19px;height:19px}
#toast{position:fixed;right:20px;bottom:20px;z-index:999;padding:11px 14px;border:1px solid var(--border2);border-radius:10px;background:var(--surface2);box-shadow:var(--shadow-2);font-size:12px;opacity:0;transform:translateY(8px);transition:.2s}.show#toast,#toast.show{opacity:1;transform:none}.empty,.empty-state{text-align:center;padding:30px;border:1px dashed var(--border);border-radius:var(--radius-md);color:var(--text3);font-size:12px}
#loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg)}.spinner,.loader{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--company-color);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}#loading p{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
#edit-banner{display:none;padding:7px;text-align:center;border-bottom:1px solid var(--company-color);background:var(--company-dim);color:var(--company-color);font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em}body:not(.readonly) #edit-banner{display:block}body.readonly .edit-only,body.readonly .status-select,body.readonly .sel{display:none!important}

@media(max-width:760px){#sidebar{display:none}#bottom-nav{display:block;position:fixed;left:0;right:0;bottom:0;z-index:80;background:rgba(17,16,22,.94);backdrop-filter:blur(18px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}#main{padding-bottom:74px}.page,.main-panel,main{padding:24px 16px 96px}.ph h1,.header-left h1{font-size:28px}.stats-grid,.stats-bar{grid-template-columns:repeat(2,1fr)}.split-grid{grid-template-columns:1fr}.fin-grid{grid-template-columns:1fr}.task-row,.task-item{align-items:flex-start}.task-meta{max-width:42%}.badge-project{display:none}.csv-import{align-items:flex-start;flex-direction:column}.csv-import__button{width:100%;justify-content:center}.subtask-panel.open,.subtasks-panel.open{padding-left:14px}.content-type-row{align-items:flex-start;flex-direction:column}.split-btns{grid-template-columns:1fr}.modal{padding-inline:16px}}


/* ── DYRECTIO premium polish v2 ── */
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:999px}
*::-webkit-scrollbar-thumb:hover{background:var(--border2)}
html{scrollbar-color:var(--surface4) transparent;scrollbar-width:thin}

button:focus-visible,.tab:focus-visible,.tab-btn:focus-visible,.main-tab:focus-visible,.sb-item:focus-visible,.bn-item:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--company-color);outline-offset:2px;border-radius:8px}

.page,.main-panel,main{padding:38px 46px 64px}
@media(max-width:760px){.page,.main-panel,main{padding:24px 16px 100px}}

.ph h1,.header-left h1{font-size:clamp(30px,3.4vw,44px);letter-spacing:-.05em}
.ph p{font-size:14.5px;color:var(--text2);margin-top:9px;line-height:1.5}

.stat-card,.stat{padding:22px}
.card{padding:24px}
.stats-grid,.stats-bar{gap:14px;margin-bottom:28px}
.stat-num,.fin-amount,.target-num,.tracker-sum-num{font-size:32px;font-variant-numeric:tabular-nums}

.stat-card,.stat,.card,.fin-card,.split-card,.profile-block,.target-card,.tracker-sum-card{transition:transform .22s var(--ease),box-shadow .22s var(--ease),border-color .22s var(--ease)}
.stat-card:hover,.stat:hover,.split-card:hover,.profile-block:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:0 4px 18px rgba(0,0,0,.26),0 22px 48px rgba(0,0,0,.22)}

.task-row,.task-item{transition:background .18s var(--ease),border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease)}
.task-row:hover,.task-item:hover{transform:translateX(2px);box-shadow:0 2px 12px rgba(0,0,0,.2)}

.btn-primary,.btn-add,.btn-sub,.btn-ghost,#backoffice-btn{transition:transform .14s var(--ease),filter .18s var(--ease),background .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease)}
.btn-primary:active,.btn-add:active,.btn-sub:active,.btn-ghost:active{transform:scale(.96)}
.ibtn:active,.icon-btn:active{transform:scale(.9)}

/* ═══════════════════════════════════════════════════════════════
   DYRECTIO — Liquid Glass (ispirato al design system iOS 26)
   Materiali vetro traslucido, luce specular, profondità, ambient
   color legato a --company-color. Solo stile — nessuna logica JS.
   ═══════════════════════════════════════════════════════════════ */

:root{
  --radius-sm:12px; --radius-md:17px; --radius-lg:24px; --radius-xl:30px;
  --ease-spring:cubic-bezier(.22,1,.36,1);
  --glass-hl:inset 0 1px 0 rgba(255,255,255,.10), inset 0 0 0 1px rgba(255,255,255,.025);
  --glass-border:1px solid rgba(255,255,255,.09);
}

/* ── Ambient background: colore del cliente che "respira" dietro il vetro ── */
html{background:var(--bg)}
body{
  background:
    radial-gradient(ellipse 1000px 640px at 12% -8%, color-mix(in srgb,var(--company-color) 26%,transparent), transparent 62%),
    radial-gradient(ellipse 760px 520px at 104% 8%, rgba(141,120,255,.14), transparent 58%),
    radial-gradient(ellipse 820px 600px at 45% 112%, color-mix(in srgb,var(--company-color) 12%,transparent), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}

/* ── Sidebar: pannello di vetro fluttuante ── */
#sidebar{
  margin:14px 0 14px 14px;
  top:14px;
  height:calc(100vh - 28px);
  border-radius:var(--radius-lg);
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.014)),rgba(17,16,22,.5);
  backdrop-filter:blur(30px) saturate(1.7);
  -webkit-backdrop-filter:blur(30px) saturate(1.7);
  border:var(--glass-border);
  box-shadow:var(--glass-hl),0 24px 60px rgba(0,0,0,.42);
}
.sb-logo{border-bottom:1px solid rgba(255,255,255,.07)}
.sb-footer{border-top:1px solid rgba(255,255,255,.07)}
.sb-item.active{background:color-mix(in srgb,var(--company-color) 16%,transparent)}
.conn-pill,#conn-status{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px)}

/* ── Header (versioni per-client con <header>) ── */
header{

  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);

/* ═══════════════ DYRECTIO — motion & polish ═══════════════ */
:root{

.task-wrapper:nth-child(9){animation-delay:.26s}

/* ── FAB: respiro continuo, si ferma al tocco ── */
@keyframes fabBreathe{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 4px 18px color-mix(in srgb,var(--accent) 55%,transparent),0 12px 36px rgba(0,0,0,.42)}50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 6px 26px color-mix(in srgb,var(--accent) 78%,transparent),0 14px 40px rgba(0,0,0,.42)}}
#fab-add{animation:fabBreathe 3.4s ease-in-out infinite}
#fab-add:hover,#fab-add:active{animation-play-state:paused}

/* ── Toast: entrata a molla ── */

/* ── Transizioni di colore morbide quando cambi progetto/cliente ── */

/* ── Sub-task panel: easing più morbido in apertura ── */

/* ── Modal: leggero rimbalzo in apertura ── */

/* ── Rispetta chi preferisce meno movimento ── */

  .task-wrapper,.stats-grid .stat-card,.stats-bar .stat,
  #fab-add{animation:none!important}
  *{transition-duration:.01ms!important}
}

<body class="readonly">

<div id="loading">
  <div class="loader"></div>
  <p>Caricamento…</p>
</div>

<div id="toast"></div>

<div id="app" style="display:none">
  <div id="edit-banner">✏️ Modalità modifica attiva</div>

  <header>
    <div class="header-left">
      <h1>Gestionale <span id="company-title">SlabHub</span></h1>
      <div class="header-sub"><span class="status-dot"></span>Dashboard operativa · SlabHub</div>
    </div>
    <div class="header-right">
      <div id="conn-status">● Connessione…</div>
      <a id="backoffice-btn" href="#" target="_blank" title="Apri Backoffice" style="display:none">
        🖥 Backoffice
      </a>
      <button id="lock-btn" title="Modalità modifica" onclick="window._toggleEdit()">🔒</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <main id="main-content"></main>
</div>

<script type="module">
  const COMPANIES = [
    { id: 'slabhub_gabriele', name: 'Gabriele', color: '#2d6fa3', dim: 'rgba(45,111,163,0.12)', backoffice: null },
    { id: 'slabhub_davide', name: 'Davide', color: '#1a5276', dim: 'rgba(26,82,118,0.12)', backoffice: null },
    { id: 'slabhub_valerio', name: 'Valerio', color: '#1f618d', dim: 'rgba(31,97,141,0.12)', backoffice: null },
  ];

  let db = null;
  let activeTab = COMPANIES[0].id;
  let allTasks = {};
  let editingId = null;
  let openAccordions = new Set();
  let isEditMode = false;

  // ── Edit mode toggle ────────────────────────────────────────
  window._toggleEdit = function() {
    isEditMode = !isEditMode;
    document.body.classList.toggle('readonly', !isEditMode);
    document.getElementById('lock-btn').textContent = isEditMode ? '🔓' : '🔒';
    toast(isEditMode ? '✏️ Modifica abilitata' : '🔒 Sola lettura');
  };

  // ── Company color switch ────────────────────────────────────
  function applyCompanyColor(cid) {
    const c = COMPANIES.find(x => x.id === cid);
    if (!c) return;
    document.documentElement.style.setProperty('--company-color', c.color);
    document.documentElement.style.setProperty('--company-dim', c.dim);
    document.getElementById('company-title').textContent = c.name;
    const btn = document.getElementById('backoffice-btn');
    if (c.backoffice) {
      btn.href = c.backoffice;
      btn.style.display = 'flex';
    } else {
      btn.style.display = 'none';
    }
  }

  // ── Firebase ────────────────────────────────────────────────
  async function initFirebase(cfg) {
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const { getDatabase, ref, onValue, set, remove, push }
        = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');

      const app = initializeApp(cfg);
      db = getDatabase(app);
      setConnStatus('connected', '● Live');

      COMPANIES.forEach(c => {
        onValue(ref(db, `tasks/${c.id}`), snap => {
          allTasks[c.id] = snap.val() || {};
          if (activeTab === c.id) renderTasks(c.id);
          updateTabCounts();
        }, err => {
          setConnStatus('error', '● Errore DB');
          console.error(err);
        });
      });

      window._fbSet    = (path, val) => set(ref(db, path), val);
      window._fbRemove = (path)      => remove(ref(db, path));
      window._fbPush   = (path, val) => push(ref(db, path), val);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      buildUI();
      return Promise.resolve();
    } catch(e) {
      console.error(e);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      buildUI();
    }
  }

  function setConnStatus(cls, txt) {
    const el = document.getElementById('conn-status');
    el.className = cls; el.textContent = txt;
  }

  // ── UI Build ────────────────────────────────────────────────
  function buildUI() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = COMPANIES.map(c =>
      `<button class="tab-btn" id="tab-${c.id}" onclick="window._switchTab('${c.id}')">
         ${c.name} <span class="tab-count" id="cnt-${c.id}">0</span>
       </button>`
    ).join('');

    const main = document.getElementById('main-content');
    main.innerHTML = COMPANIES.map(c =>
      `<div class="company-panel" id="panel-${c.id}">
         <div class="stats-bar" id="stats-${c.id}"></div>
         <div class="add-section edit-only">
           <input type="text" id="input-${c.id}" placeholder="Nuova task…"
                  onkeydown="if(event.key==='Enter') window._addTask('${c.id}')"/>
           <button class="btn-add" onclick="window._addTask('${c.id}')">+ Aggiungi</button>
         </div>
         <div class="tasks-list" id="list-${c.id}"></div>
       </div>`
    ).join('');

    switchTab(COMPANIES[0].id);
  }

  function switchTab(cid) {
    activeTab = cid;
    applyCompanyColor(cid);
    COMPANIES.forEach(c => {
      document.getElementById(`tab-${c.id}`)?.classList.toggle('active', c.id === cid);
      document.getElementById(`panel-${c.id}`)?.classList.toggle('active', c.id === cid);
    });
    renderTasks(cid);
  }
  window._switchTab = switchTab;

  function updateTabCounts() {
    COMPANIES.forEach(c => {
      const el = document.getElementById(`cnt-${c.id}`);
      if (el) el.textContent = Object.keys(allTasks[c.id] || {}).length;
    });
  }

  // ── Stats ───────────────────────────────────────────────────
  function calcStats(cid) {
    const tasks = allTasks[cid] || {};
    const arr = Object.values(tasks);
    let totalTasks = arr.length;
    let doneTasks = arr.filter(t => t.status === 'done').length;
    let totalSubs = 0, doneSubs = 0;
    arr.forEach(t => {
      const subs = t.subtasks ? Object.values(t.subtasks) : [];
      totalSubs += subs.length;
      doneSubs  += subs.filter(s => s.status === 'done').length;
    });
    return { totalTasks, doneTasks, totalSubs, doneSubs };
  }

  // ── Render ──────────────────────────────────────────────────
  function renderTasks(cid) {
    const tasks = allTasks[cid] || {};
    const statusOrder = { inprogress:0, todo:1, incomplete:2, missingfiles:3, done:4 };
    const arr = Object.entries(tasks).sort((a,b) => {
      const so = (statusOrder[a[1].status]??1) - (statusOrder[b[1].status]??1);
      if (so !== 0) return so;
      return (a[1].createdAt||0) - (b[1].createdAt||0);
    });

    const { totalTasks, doneTasks, totalSubs, doneSubs } = calcStats(cid);
    const totalItems = totalTasks + totalSubs;
    const doneItems  = doneTasks  + doneSubs;
    const pct = totalItems > 0 ? Math.round(doneItems / totalItems * 100) : 0;

    const statsEl = document.getElementById(`stats-${cid}`);
    if (statsEl) statsEl.innerHTML = `
      <div class="stat">
        <div class="stat-label">Task</div>
        <div class="stat-num">${totalTasks}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sub-task</div>
        <div class="stat-num">${totalSubs}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Completate</div>
        <div class="stat-num highlight">${doneItems}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Progresso</div>
        <div class="stat-num highlight">${pct}%</div>
        <div class="stat-bar-inner"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;

    const listEl = document.getElementById(`list-${cid}`);
    if (!listEl) return;

    if (arr.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>Nessuna task ancora.</div>`;
      return;
    }

    listEl.innerHTML = arr.map(([tid, task]) => renderTaskWrapper(cid, tid, task)).join('');

    openAccordions.forEach(tid => {
      const panel = document.getElementById(`sub-panel-${tid}`);
      const btn   = document.getElementById(`expand-btn-${tid}`);
      const wrap  = document.getElementById(`wrap-${tid}`);
      if (panel) panel.classList.add('open');
      if (btn)   btn.classList.add('open');
      if (wrap)  wrap.classList.add('has-subtasks-open');
    });

    if (editingId) {
      const inputId = editingId.type === 'subtask' ? `sedit-${editingId.sid}` : `tedit-${editingId.tid}`;
      setTimeout(() => {
        const inp = document.getElementById(inputId);
        if (inp) { inp.focus(); inp.select(); }
      }, 30);
    }
  }

  function renderTaskWrapper(cid, tid, task) {
    const subtasks = task.subtasks
      ? Object.entries(task.subtasks).sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0))
      : [];
    const subCount = subtasks.length;
    const doneSubs = subtasks.filter(([,s]) => s.status === 'done').length;
    const incompleteSubs = subCount - doneSubs;
    const isBlocked = subCount > 0 && incompleteSubs > 0 && task.status !== 'done';
    const allDone   = subCount > 0 && doneSubs === subCount;
    const isOpen    = openAccordions.has(tid);

    const statusLabel = { todo:'Da fare', inprogress:'In corso', done:'Completata', incomplete:'Incarico incompleto', missingfiles:'File mancanti' }[task.status] || 'Da fare';
    const badgeCls    = { todo:'badge-todo', inprogress:'badge-inprogress', done:'badge-done', incomplete:'badge-incomplete', missingfiles:'badge-missingfiles' }[task.status] || 'badge-todo';
    const date = task.createdAt ? new Date(task.createdAt).toLocaleDateString('it-IT',{day:'2-digit',month:'short'}) : '';
    const isEditingTask = editingId?.type === 'task' && editingId?.tid === tid;

    const expandBtnCls = `expand-btn${incompleteSubs>0&&subCount>0?' has-incomplete':''}${allDone?' all-done':''}`;

    const expandBtn = `
      <button class="${expandBtnCls} ${subCount===0?'no-sub':''}" id="expand-btn-${tid}"
              onclick="window._toggleAccordion('${tid}')"
              title="Mostra/nascondi sub-task">
        <span class="arrow">▶</span>
        <span class="sub-count">${subCount}</span>
      </button>`;

    const taskRow = `
      <div class="task-item status-${task.status||'todo'}" id="task-${tid}">
        ${expandBtn}
        ${isEditingTask
          ? `<input class="task-name-edit" id="tedit-${tid}" value="${escHtml(task.name)}"
                    onkeydown="if(event.key==='Enter') window._saveTaskEdit('${cid}','${tid}'); if(event.key==='Escape') window._cancelEdit()"/>`
          : `<span class="task-name">${escHtml(task.name)}</span>`
        }
        <div class="task-meta">
          ${!isEditingTask ? `<span class="status-badge ${badgeCls}">${statusLabel}</span>` : ''}
          <select class="status-select" onchange="window._updateStatus('${cid}','${tid}',this.value)">
            <option value="todo"          ${task.status==='todo'          ?'selected':''}>Da fare</option>
            <option value="inprogress"    ${task.status==='inprogress'    ?'selected':''}>In corso</option>
            <option value="done"          ${task.status==='done'          ?'selected':''}>Completata</option>
            <option value="incomplete"    ${task.status==='incomplete'    ?'selected':''}>Incompleto</option>
            <option value="missingfiles"  ${task.status==='missingfiles'  ?'selected':''}>File mancanti</option>
          </select>
          <span class="edit-only" style="display:contents">
            ${!isEditingTask
              ? `<button class="icon-btn" title="Modifica" onclick="window._startTaskEdit('${cid}','${tid}')">✏️</button>`
              : `<button class="icon-btn" title="Salva" onclick="window._saveTaskEdit('${cid}','${tid}')">💾</button>
                 <button class="icon-btn" title="Annulla" onclick="window._cancelEdit()">✕</button>`
            }
            <button class="icon-btn delete" title="Elimina" onclick="window._deleteTask('${cid}','${tid}')">🗑</button>
          </span>
          ${date ? `<span class="task-date">${date}</span>` : ''}
        </div>
      </div>`;

    const subtaskRows = subtasks.map(([sid, sub]) => renderSubtaskRow(cid, tid, sid, sub)).join('');

    const subPanel = `
      <div class="subtasks-panel" id="sub-panel-${tid}">
        <div class="subtasks-list" id="sublist-${tid}">
          ${subCount === 0
            ? `<div style="font-size:0.72rem;color:var(--muted);padding:0.2rem 0">Nessuna sub-task ancora.</div>`
            : subtaskRows
          }
        </div>
        <div class="add-subtask-row edit-only">
          <input type="text" id="sub-input-${tid}" placeholder="Nuova sub-task…"
                 onkeydown="if(event.key==='Enter') window._addSubtask('${cid}','${tid}')"/>
          <button class="btn-sub" onclick="window._addSubtask('${cid}','${tid}')">+ Sub-task</button>
        </div>
      </div>`;

    return `<div class="task-wrapper${isOpen?' has-subtasks-open':''}" id="wrap-${tid}">${taskRow}${subPanel}</div>`;
  }

  function renderSubtaskRow(cid, tid, sid, sub) {
    const isEditing = editingId?.type === 'subtask' && editingId?.sid === sid;
    const badgeCls  = { todo:'badge-todo', inprogress:'badge-inprogress', done:'badge-done', incomplete:'badge-incomplete', missingfiles:'badge-missingfiles' }[sub.status] || 'badge-todo';
    const label     = { todo:'Da fare', inprogress:'In corso', done:'Completata', incomplete:'Incompleto', missingfiles:'File mancanti' }[sub.status] || 'Da fare';

    return `
      <div class="subtask-item status-${sub.status||'todo'}" id="subtask-${sid}">
        <span class="subtask-arrow">↳</span>
        ${isEditing
          ? `<input class="subtask-name-edit" id="sedit-${sid}" value="${escHtml(sub.name)}"
                    onkeydown="if(event.key==='Enter') window._saveSubEdit('${cid}','${tid}','${sid}'); if(event.key==='Escape') window._cancelEdit()"/>`
          : `<span class="subtask-name">${escHtml(sub.name)}</span>`
        }
        <div class="task-meta">
          ${!isEditing ? `<span class="status-badge ${badgeCls}" style="font-size:0.58rem">${label}</span>` : ''}
          <select class="status-select" style="font-size:0.65rem;padding:0.22rem 0.45rem"
                  onchange="window._updateSubStatus('${cid}','${tid}','${sid}',this.value)">
            <option value="todo"         ${sub.status==='todo'         ?'selected':''}>Da fare</option>
            <option value="inprogress"   ${sub.status==='inprogress'   ?'selected':''}>In corso</option>
            <option value="done"         ${sub.status==='done'         ?'selected':''}>Completata</option>
            <option value="incomplete"   ${sub.status==='incomplete'   ?'selected':''}>Incompleto</option>
            <option value="missingfiles" ${sub.status==='missingfiles' ?'selected':''}>File mancanti</option>
          </select>
          <span class="edit-only" style="display:contents">
            ${!isEditing
              ? `<button class="icon-btn" style="font-size:0.75rem" title="Modifica" onclick="window._startSubEdit('${cid}','${tid}','${sid}')">✏️</button>`
              : `<button class="icon-btn" style="font-size:0.75rem" title="Salva" onclick="window._saveSubEdit('${cid}','${tid}','${sid}')">💾</button>
                 <button class="icon-btn" style="font-size:0.75rem" title="Annulla" onclick="window._cancelEdit()">✕</button>`
            }
            <button class="icon-btn delete" style="font-size:0.75rem" title="Elimina" onclick="window._deleteSubtask('${cid}','${tid}','${sid}')">🗑</button>
          </span>
        </div>
      </div>`;
  }

  // ── Accordion ───────────────────────────────────────────────
  window._toggleAccordion = function(tid) {
    const panel = document.getElementById(`sub-panel-${tid}`);
    const btn   = document.getElementById(`expand-btn-${tid}`);
    const wrap  = document.getElementById(`wrap-${tid}`);
    if (!panel) return;
    if (openAccordions.has(tid)) {
      openAccordions.delete(tid);
      panel.classList.remove('open');
      btn?.classList.remove('open');
      wrap?.classList.remove('has-subtasks-open');
    } else {
      openAccordions.add(tid);
      panel.classList.add('open');
      btn?.classList.add('open');
      wrap?.classList.add('has-subtasks-open');
      setTimeout(() => document.getElementById(`sub-input-${tid}`)?.focus(), 50);
    }
  };

  // ── CRUD ────────────────────────────────────────────────────
  window._addTask = async function(cid) {
    const inp = document.getElementById(`input-${cid}`);
    const name = inp.value.trim();
    if (!name) return;
    if (!db) { toast('⚠ Database non configurato'); return; }
    try {
      await window._fbPush(`tasks/${cid}`, { name, status:'todo', createdAt: Date.now() });
      inp.value = '';
      toast('Task aggiunta ✓');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._updateStatus = async function(cid, tid, status) {
    if (!db) return;
    if (status === 'done') {
      const row = document.getElementById(`task-${tid}`);
      if (row) { row.classList.add('status-just-done'); setTimeout(() => row.classList.remove('status-just-done'), 900); }
    }
    try {
      await window._fbSet(`tasks/${cid}/${tid}/status`, status);
      toast('Stato aggiornato ✓');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._deleteTask = async function(cid, tid) {
    if (!db) return;
    const task = allTasks[cid]?.[tid];
    const subCount = task?.subtasks ? Object.keys(task.subtasks).length : 0;
    if (!confirm(subCount > 0 ? `Eliminare questa task e le sue ${subCount} sub-task?` : 'Eliminare questa task?')) return;
    try {
      await window._fbRemove(`tasks/${cid}/${tid}`);
      openAccordions.delete(tid);
      toast('Task eliminata');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._startTaskEdit = function(cid, tid) { editingId = { type:'task', cid, tid }; renderTasks(cid); };

  window._saveTaskEdit = async function(cid, tid) {
    const inp = document.getElementById(`tedit-${tid}`);
    if (!inp) return;
    const name = inp.value.trim(); if (!name || !db) return;
    try { await window._fbSet(`tasks/${cid}/${tid}/name`, name); editingId = null; toast('Task modificata ✓'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._addSubtask = async function(cid, tid) {
    const inp = document.getElementById(`sub-input-${tid}`);
    const name = inp.value.trim(); if (!name) return;
    if (!db) { toast('⚠ Database non configurato'); return; }
    try {
      await window._fbPush(`tasks/${cid}/${tid}/subtasks`, { name, status:'todo', createdAt: Date.now() });
      inp.value = ''; openAccordions.add(tid);
      toast('Sub-task aggiunta ✓');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._updateSubStatus = async function(cid, tid, sid, status) {
    if (!db) return;
    try { await window._fbSet(`tasks/${cid}/${tid}/subtasks/${sid}/status`, status); toast('Stato aggiornato ✓'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._deleteSubtask = async function(cid, tid, sid) {
    if (!db) return;
    if (!confirm('Eliminare questa sub-task?')) return;
    try { await window._fbRemove(`tasks/${cid}/${tid}/subtasks/${sid}`); toast('Sub-task eliminata'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._startSubEdit = function(cid, tid, sid) { editingId = { type:'subtask', cid, tid, sid }; openAccordions.add(tid); renderTasks(cid); };

  window._saveSubEdit = async function(cid, tid, sid) {
    const inp = document.getElementById(`sedit-${sid}`);
    if (!inp) return;
    const name = inp.value.trim(); if (!name || !db) return;
    try { await window._fbSet(`tasks/${cid}/${tid}/subtasks/${sid}/name`, name); editingId = null; toast('Sub-task modificata ✓'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._cancelEdit = function() {
    const prev = editingId; editingId = null;
    if (prev) COMPANIES.forEach(c => { if (allTasks[c.id]?.[prev.tid]) renderTasks(c.id); });
  };

  // ── Utils ───────────────────────────────────────────────────
  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }


  // ── Seed SlabHub ────────────────────────────────────────────
  const SLABHUB_SEED = {
    'slabhub_gabriele': [
      { name: 'Nuove grafiche', status: 'todo' },
      { name: 'Copertine storie in evidenza', status: 'todo' },
      { name: 'Facebook Ads (con Valerio)', status: 'todo' },
      { name: 'Migliorare le collab', status: 'todo' },
      { name: 'Cercare fornitore cover', status: 'todo' },
      { name: 'Pensare a nuovi contenuti per presentare il prodotto in modo premium (basandosi sui contenuti esistenti)', status: 'todo' },
    ],
    'slabhub_davide': [
      { name: 'Contenuti nuovi (con Valerio)', status: 'todo' },
      { name: 'Storie su Instagram e TikTok', status: 'todo' },
      { name: 'Migliorare le collab', status: 'todo' },
      { name: 'Cercare fornitore cover', status: 'todo' },
      { name: 'Pensare a nuovi contenuti per presentare il prodotto in modo premium (basandosi sui contenuti esistenti)', status: 'todo' },
    ],
    'slabhub_valerio': [
      { name: 'Contenuti nuovi (con Davide)', status: 'todo' },
      { name: 'Sistemare nuovi prodotti', status: 'todo' },
      { name: 'Facebook Ads (con Gabriele)', status: 'todo' },
      { name: 'Migliorare le collab', status: 'todo' },
      { name: 'Cercare fornitore cover', status: 'todo' },
      { name: 'Pensare a nuovi contenuti per presentare il prodotto in modo premium (basandosi sui contenuti esistenti)', status: 'todo' },
    ],
  };

  async function seedSlabHub(db) {
    const { ref, get, push } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    for (const [cid, tasks] of Object.entries(SLABHUB_SEED)) {
      const snap = await get(ref(db, `tasks/${cid}`));
      if (snap.exists()) continue;
      for (const task of tasks) {
        await push(ref(db, `tasks/${cid}`), { ...task, createdAt: Date.now() });
      }
    }
  }

  // ── Boot ────────────────────────────────────────────────────
  const cfg = {
    apiKey: "AIzaSyAfy8G_pHz8DftywbYi4YX1k71EyrmOgxQ",
    authDomain: "gestionale-gabriele.firebaseapp.com",
    databaseURL: "https://gestionale-gabriele-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gestionale-gabriele",
  };
  initFirebase(cfg).then(() => {
    setTimeout(async () => { if (db) await seedSlabHub(db); }, 1500);
  });
</script>
</body>
</html>
