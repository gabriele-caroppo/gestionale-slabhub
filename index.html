<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestionale SlabHub</title>
<link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #212121;
    --border: #282828;
    --text: #f2f2f2;
    --muted: #5a5a5a;
    --accent: #f2f2f2;

    /* Status colors */
    --todo: #888;
    --inprogress: #f4c85a;
    --done: #4ade80;
    --incomplete: #f49632;
    --missingfiles: #a78bfa;

    /* Company colors */
    --focacciamo: #c0392b;
    --focacciamo-dim: rgba(192,57,43,0.12);
    --mancha: #ff7b00;
    --mancha-dim: rgba(255,123,0,0.12);
    --futuri: #39d353;
    --futuri-dim: rgba(57,211,83,0.12);

    --company-color: #2d6fa3;
    --company-dim: rgba(45,111,163,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* READONLY MODE - nascondi elementi di modifica */
  body.readonly .edit-only { display: none !important; }
  body.readonly .status-select { pointer-events: none; appearance: none; -webkit-appearance: none; border-color: transparent; background: transparent; padding-left: 0; cursor: default; }
  body.readonly .expand-btn { pointer-events: auto; } /* accordion sempre cliccabile */
  body.readonly .status-select { display: none !important; }
  body.readonly .expand-btn.no-sub { visibility: hidden; pointer-events: none; }

  /* BACKOFFICE BUTTON */
  #backoffice-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--company-color);
    background: var(--company-dim);
    border: 1px solid var(--company-color);
    border-radius: 20px;
    padding: 0.4rem 0.9rem;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #backoffice-btn:hover { opacity: 0.8; transform: translateY(-1px); }

  /* LOCK BUTTON */
  #lock-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #lock-btn:hover { border-color: var(--company-color); color: var(--company-color); }
  body:not(.readonly) #lock-btn { border-color: var(--company-color); color: var(--company-color); background: var(--company-dim); }

  /* HEADER */
  header {
    padding: 1.8rem 2rem 1.4rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-weight: 700;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  .header-left h1 span { color: var(--company-color); transition: color 0.3s; }

  .header-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.35rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--done);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2.5s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }

  .header-right { display: flex; align-items: center; gap: 0.6rem; }

  #conn-status {
    font-size: 0.65rem;
    color: var(--muted);
    padding: 0.4rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  #conn-status.connected { color: var(--done); border-color: rgba(74,222,128,0.3); }
  #conn-status.error { color: #f87171; border-color: rgba(248,113,113,0.3); }

  /* TABS */
  .tabs {
    display: flex;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.02em;
    padding: 1rem 1.4rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--company-color); border-bottom-color: var(--company-color); }

  .tab-count {
    font-size: 0.6rem;
    font-weight: 700;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 6px;
    margin-left: 5px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab-btn.active .tab-count {
    background: var(--company-color);
    color: #fff;
  }

  /* MAIN */
  main { padding: 1.8rem 2rem; max-width: 1100px; }

  .company-panel { display: none; }
  .company-panel.active { display: block; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  /* STATS */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.8rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
  }
  .stat-num {
    font-weight: 700;
    font-size: 1.6rem;
    line-height: 1;
    color: var(--text);
  }
  .stat-num.highlight { color: var(--company-color); }
  .stat-bar-inner {
    height: 2px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 0.4rem;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--company-color);
    transition: width 0.5s ease;
  }

  /* ADD TASK */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.6rem;
    display: flex;
    gap: 0.7rem;
    align-items: center;
  }
  .add-section input[type="text"] {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    padding: 0.3rem 0;
    outline: none;
  }
  .add-section input[type="text"]::placeholder { color: var(--muted); }

  .btn-add {
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 6px;
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--company-color);
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }

  /* TASKS LIST */
  .tasks-list { display: flex; flex-direction: column; gap: 0.5rem; }

  /* TASK WRAPPER */
  .task-wrapper { display: flex; flex-direction: column; }

  /* TASK ITEM */
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .task-wrapper.has-subtasks-open > .task-item {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    border-bottom-color: transparent;
  }

  .task-item:hover { background: var(--surface2); }

  /* Colored left border by status */
  .task-item.status-todo        { border-left: 3px solid var(--border); }
  .task-item.status-inprogress  { border-left: 3px solid var(--inprogress); }
  .task-item.status-done        { border-left: 3px solid var(--done); }
  .task-item.status-incomplete  { border-left: 3px solid var(--incomplete); }
  .task-item.status-missingfiles{ border-left: 3px solid var(--missingfiles); }

  .task-item.status-done .task-name { text-decoration: line-through; color: var(--muted); }

  /* EXPAND BTN */
  .expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.65rem;
    padding: 0.2rem 0.3rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }
  .expand-btn:hover { color: var(--text); background: var(--surface2); }
  .expand-btn .arrow { display: inline-block; transition: transform 0.2s; }
  .expand-btn.open .arrow { transform: rotate(90deg); }
  .expand-btn .sub-count {
    font-size: 0.6rem;
    font-weight: 700;
    background: var(--surface2);
    border-radius: 8px;
    padding: 1px 5px;
    min-width: 18px;
    text-align: center;
  }
  .expand-btn.has-incomplete .sub-count {
    background: rgba(244,200,90,0.2);
    color: var(--inprogress);
  }
  .expand-btn.all-done .sub-count {
    background: rgba(74,222,128,0.15);
    color: var(--done);
  }

  /* TASK NAME */
  .task-name {
    flex: 1;
    min-width: 0;
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
    overflow-wrap: anywhere;
    letter-spacing: -0.01em;
  }
  .task-name-edit {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--company-color);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.9rem;
    padding: 0.35rem 0.7rem;
    outline: none;
    min-width: 0;
  }

  /* TASK META */
  .task-meta {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  /* STATUS SELECT */
  .status-select {
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 0.28rem 0.5rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    max-width: 130px;
  }
  .status-select:focus { border-color: var(--company-color); }
  .status-select option { background: var(--surface2); }

  /* STATUS BADGE */
  .status-badge {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-todo        { background: rgba(136,136,136,0.15); color: #888; }
  .badge-inprogress  { background: rgba(244,200,90,0.15);  color: var(--inprogress); }
  .badge-done        { background: rgba(74,222,128,0.15);  color: var(--done); }
  .badge-incomplete  { background: rgba(244,150,50,0.15);  color: var(--incomplete); }
  .badge-missingfiles{ background: rgba(167,139,250,0.15); color: var(--missingfiles); }

  /* ICON BTNS */
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.82rem;
    padding: 0.22rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }
  .icon-btn.delete:hover { color: #f87171; }

  .task-date {
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 500;
  }

  /* BLOCKED BADGE */
  .blocked-badge {
    font-size: 0.58rem;
    font-weight: 700;
    background: rgba(248,113,113,0.1);
    color: #f87171;
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 20px;
    padding: 0.18rem 0.45rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* SUBTASKS PANEL */
  .subtasks-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .subtasks-panel.open {
    max-height: 1200px;
    padding: 0.8rem 1rem 0.9rem 2.2rem;
  }

  .subtasks-list { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.7rem; }

  /* SUBTASK ITEM */
  .subtask-item {
    background: var(--surface3);
    border: 1px solid #252525;
    border-radius: 8px;
    padding: 0.55rem 0.85rem;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    font-size: 0.84rem;
  }
  .subtask-item.status-todo        { border-left: 2px solid #333; }
  .subtask-item.status-inprogress  { border-left: 2px solid var(--inprogress); }
  .subtask-item.status-done        { border-left: 2px solid var(--done); }
  .subtask-item.status-incomplete  { border-left: 2px solid var(--incomplete); }
  .subtask-item.status-missingfiles{ border-left: 2px solid var(--missingfiles); }
  .subtask-item.status-done .subtask-name { text-decoration: line-through; color: var(--muted); }

  .subtask-arrow { color: var(--muted); font-size: 0.65rem; flex-shrink: 0; }

  .subtask-name {
    flex: 1;
    min-width: 0;
    word-break: break-word;
    overflow-wrap: anywhere;
    font-weight: 400;
    color: var(--text);
  }
  .subtask-name-edit {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--company-color);
    border-radius: 5px;
    color: var(--text);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.84rem;
    padding: 0.25rem 0.55rem;
    outline: none;
    min-width: 0;
  }

  /* ADD SUBTASK */
  .add-subtask-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .add-subtask-row input {
    flex: 1;
    min-width: 0;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 0.8rem;
    padding: 0.45rem 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-subtask-row input:focus { border-color: var(--company-color); }
  .add-subtask-row input::placeholder { color: var(--muted); }

  .btn-sub {
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    font-weight: 700;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
    border: none;
    border-radius: 6px;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-sub:hover { color: var(--text); border-color: var(--company-color); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 2.5rem 2rem;
    color: var(--muted);
    font-size: 0.82rem;
    border: 1px dashed var(--border);
    border-radius: 10px;
    font-weight: 400;
  }
  .empty-icon { font-size: 1.8rem; margin-bottom: 0.8rem; opacity: 0.3; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; gap: 1rem;
  }
  .loader {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: #2d6fa3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  #loading p { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.75rem 1.2rem;
    border-radius: 8px;
    opacity: 0; transform: translateY(8px);
    transition: all 0.2s;
    z-index: 200; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* EDIT MODE BANNER */
  #edit-banner {
    display: none;
    background: var(--company-dim);
    border-bottom: 1px solid var(--company-color);
    padding: 0.5rem 2rem;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--company-color);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
  }
  body:not(.readonly) #edit-banner { display: block; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header, .tabs, main { padding-left: 1rem; padding-right: 1rem; }
    .task-item { flex-wrap: wrap; }
    .task-meta { width: 100%; justify-content: flex-end; margin-top: 0.3rem; }
    .subtasks-panel.open { padding-left: 0.8rem; padding-right: 0.6rem; }
    .subtask-item { flex-wrap: wrap; }
    .subtask-item .task-meta { width: 100%; justify-content: flex-end; }
    .subtask-name { width: 100%; }
    .add-subtask-row { flex-wrap: wrap; }
    .add-subtask-row input { width: 100%; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .status-select { max-width: 110px; }
  }
</style>
</head>
<body class="readonly">

<div id="loading">
  <div class="loader"></div>
  <p>Caricamento…</p>
</div>

<div id="toast"></div>

<div id="app" style="display:none">
  <div id="edit-banner">✏️ Modalità modifica attiva</div>

  <header>
    <div class="header-left">
      <h1>Gestionale <span id="company-title">SlabHub</span></h1>
      <div class="header-sub"><span class="status-dot"></span>Dashboard operativa · SlabHub</div>
    </div>
    <div class="header-right">
      <div id="conn-status">● Connessione…</div>
      <a id="backoffice-btn" href="#" target="_blank" title="Apri Backoffice" style="display:none">
        🖥 Backoffice
      </a>
      <button id="lock-btn" title="Modalità modifica" onclick="window._toggleEdit()">🔒</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <main id="main-content"></main>
</div>

<script type="module">
  const COMPANIES = [
    { id: 'slabhub_gabriele', name: 'Gabriele', color: '#2d6fa3', dim: 'rgba(45,111,163,0.12)', backoffice: null },
    { id: 'slabhub_davide', name: 'Davide', color: '#1a5276', dim: 'rgba(26,82,118,0.12)', backoffice: null },
    { id: 'slabhub_valerio', name: 'Valerio', color: '#1f618d', dim: 'rgba(31,97,141,0.12)', backoffice: null },
  ];

  let db = null;
  let activeTab = COMPANIES[0].id;
  let allTasks = {};
  let editingId = null;
  let openAccordions = new Set();
  let isEditMode = false;

  // ── Edit mode toggle ────────────────────────────────────────
  window._toggleEdit = function() {
    isEditMode = !isEditMode;
    document.body.classList.toggle('readonly', !isEditMode);
    document.getElementById('lock-btn').textContent = isEditMode ? '🔓' : '🔒';
    toast(isEditMode ? '✏️ Modifica abilitata' : '🔒 Sola lettura');
  };

  // ── Company color switch ────────────────────────────────────
  function applyCompanyColor(cid) {
    const c = COMPANIES.find(x => x.id === cid);
    if (!c) return;
    document.documentElement.style.setProperty('--company-color', c.color);
    document.documentElement.style.setProperty('--company-dim', c.dim);
    document.getElementById('company-title').textContent = c.name;
    const btn = document.getElementById('backoffice-btn');
    if (c.backoffice) {
      btn.href = c.backoffice;
      btn.style.display = 'flex';
    } else {
      btn.style.display = 'none';
    }
  }

  // ── Firebase ────────────────────────────────────────────────
  async function initFirebase(cfg) {
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const { getDatabase, ref, onValue, set, remove, push }
        = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');

      const app = initializeApp(cfg);
      db = getDatabase(app);
      setConnStatus('connected', '● Live');

      COMPANIES.forEach(c => {
        onValue(ref(db, `tasks/${c.id}`), snap => {
          allTasks[c.id] = snap.val() || {};
          if (activeTab === c.id) renderTasks(c.id);
          updateTabCounts();
        }, err => {
          setConnStatus('error', '● Errore DB');
          console.error(err);
        });
      });

      window._fbSet    = (path, val) => set(ref(db, path), val);
      window._fbRemove = (path)      => remove(ref(db, path));
      window._fbPush   = (path, val) => push(ref(db, path), val);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      buildUI();
      return Promise.resolve();
    } catch(e) {
      console.error(e);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      buildUI();
    }
  }

  function setConnStatus(cls, txt) {
    const el = document.getElementById('conn-status');
    el.className = cls; el.textContent = txt;
  }

  // ── UI Build ────────────────────────────────────────────────
  function buildUI() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = COMPANIES.map(c =>
      `<button class="tab-btn" id="tab-${c.id}" onclick="window._switchTab('${c.id}')">
         ${c.name} <span class="tab-count" id="cnt-${c.id}">0</span>
       </button>`
    ).join('');

    const main = document.getElementById('main-content');
    main.innerHTML = COMPANIES.map(c =>
      `<div class="company-panel" id="panel-${c.id}">
         <div class="stats-bar" id="stats-${c.id}"></div>
         <div class="add-section edit-only">
           <input type="text" id="input-${c.id}" placeholder="Nuova task…"
                  onkeydown="if(event.key==='Enter') window._addTask('${c.id}')"/>
           <button class="btn-add" onclick="window._addTask('${c.id}')">+ Aggiungi</button>
         </div>
         <div class="tasks-list" id="list-${c.id}"></div>
       </div>`
    ).join('');

    switchTab(COMPANIES[0].id);
  }

  function switchTab(cid) {
    activeTab = cid;
    applyCompanyColor(cid);
    COMPANIES.forEach(c => {
      document.getElementById(`tab-${c.id}`)?.classList.toggle('active', c.id === cid);
      document.getElementById(`panel-${c.id}`)?.classList.toggle('active', c.id === cid);
    });
    renderTasks(cid);
  }
  window._switchTab = switchTab;

  function updateTabCounts() {
    COMPANIES.forEach(c => {
      const el = document.getElementById(`cnt-${c.id}`);
      if (el) el.textContent = Object.keys(allTasks[c.id] || {}).length;
    });
  }

  // ── Stats ───────────────────────────────────────────────────
  function calcStats(cid) {
    const tasks = allTasks[cid] || {};
    const arr = Object.values(tasks);
    let totalTasks = arr.length;
    let doneTasks = arr.filter(t => t.status === 'done').length;
    let totalSubs = 0, doneSubs = 0;
    arr.forEach(t => {
      const subs = t.subtasks ? Object.values(t.subtasks) : [];
      totalSubs += subs.length;
      doneSubs  += subs.filter(s => s.status === 'done').length;
    });
    return { totalTasks, doneTasks, totalSubs, doneSubs };
  }

  // ── Render ──────────────────────────────────────────────────
  function renderTasks(cid) {
    const tasks = allTasks[cid] || {};
    const statusOrder = { inprogress:0, todo:1, incomplete:2, missingfiles:3, done:4 };
    const arr = Object.entries(tasks).sort((a,b) => {
      const so = (statusOrder[a[1].status]??1) - (statusOrder[b[1].status]??1);
      if (so !== 0) return so;
      return (a[1].createdAt||0) - (b[1].createdAt||0);
    });

    const { totalTasks, doneTasks, totalSubs, doneSubs } = calcStats(cid);
    const totalItems = totalTasks + totalSubs;
    const doneItems  = doneTasks  + doneSubs;
    const pct = totalItems > 0 ? Math.round(doneItems / totalItems * 100) : 0;

    const statsEl = document.getElementById(`stats-${cid}`);
    if (statsEl) statsEl.innerHTML = `
      <div class="stat">
        <div class="stat-label">Task</div>
        <div class="stat-num">${totalTasks}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sub-task</div>
        <div class="stat-num">${totalSubs}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Completate</div>
        <div class="stat-num highlight">${doneItems}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Progresso</div>
        <div class="stat-num highlight">${pct}%</div>
        <div class="stat-bar-inner"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;

    const listEl = document.getElementById(`list-${cid}`);
    if (!listEl) return;

    if (arr.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>Nessuna task ancora.</div>`;
      return;
    }

    listEl.innerHTML = arr.map(([tid, task]) => renderTaskWrapper(cid, tid, task)).join('');

    openAccordions.forEach(tid => {
      const panel = document.getElementById(`sub-panel-${tid}`);
      const btn   = document.getElementById(`expand-btn-${tid}`);
      const wrap  = document.getElementById(`wrap-${tid}`);
      if (panel) panel.classList.add('open');
      if (btn)   btn.classList.add('open');
      if (wrap)  wrap.classList.add('has-subtasks-open');
    });

    if (editingId) {
      const inputId = editingId.type === 'subtask' ? `sedit-${editingId.sid}` : `tedit-${editingId.tid}`;
      setTimeout(() => {
        const inp = document.getElementById(inputId);
        if (inp) { inp.focus(); inp.select(); }
      }, 30);
    }
  }

  function renderTaskWrapper(cid, tid, task) {
    const subtasks = task.subtasks
      ? Object.entries(task.subtasks).sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0))
      : [];
    const subCount = subtasks.length;
    const doneSubs = subtasks.filter(([,s]) => s.status === 'done').length;
    const incompleteSubs = subCount - doneSubs;
    const isBlocked = subCount > 0 && incompleteSubs > 0 && task.status !== 'done';
    const allDone   = subCount > 0 && doneSubs === subCount;
    const isOpen    = openAccordions.has(tid);

    const statusLabel = { todo:'Da fare', inprogress:'In corso', done:'Completata', incomplete:'Incarico incompleto', missingfiles:'File mancanti' }[task.status] || 'Da fare';
    const badgeCls    = { todo:'badge-todo', inprogress:'badge-inprogress', done:'badge-done', incomplete:'badge-incomplete', missingfiles:'badge-missingfiles' }[task.status] || 'badge-todo';
    const date = task.createdAt ? new Date(task.createdAt).toLocaleDateString('it-IT',{day:'2-digit',month:'short'}) : '';
    const isEditingTask = editingId?.type === 'task' && editingId?.tid === tid;

    const expandBtnCls = `expand-btn${incompleteSubs>0&&subCount>0?' has-incomplete':''}${allDone?' all-done':''}`;

    const expandBtn = `
      <button class="${expandBtnCls} ${subCount===0?'no-sub':''}" id="expand-btn-${tid}"
              onclick="window._toggleAccordion('${tid}')"
              title="Mostra/nascondi sub-task">
        <span class="arrow">▶</span>
        <span class="sub-count">${subCount}</span>
      </button>`;

    const taskRow = `
      <div class="task-item status-${task.status||'todo'}" id="task-${tid}">
        ${expandBtn}
        ${isEditingTask
          ? `<input class="task-name-edit" id="tedit-${tid}" value="${escHtml(task.name)}"
                    onkeydown="if(event.key==='Enter') window._saveTaskEdit('${cid}','${tid}'); if(event.key==='Escape') window._cancelEdit()"/>`
          : `<span class="task-name">${escHtml(task.name)}</span>`
        }
        <div class="task-meta">
          ${!isEditingTask ? `<span class="status-badge ${badgeCls}">${statusLabel}</span>` : ''}
          <select class="status-select" onchange="window._updateStatus('${cid}','${tid}',this.value)">
            <option value="todo"          ${task.status==='todo'          ?'selected':''}>Da fare</option>
            <option value="inprogress"    ${task.status==='inprogress'    ?'selected':''}>In corso</option>
            <option value="done"          ${task.status==='done'          ?'selected':''}>Completata</option>
            <option value="incomplete"    ${task.status==='incomplete'    ?'selected':''}>Incompleto</option>
            <option value="missingfiles"  ${task.status==='missingfiles'  ?'selected':''}>File mancanti</option>
          </select>
          <span class="edit-only" style="display:contents">
            ${!isEditingTask
              ? `<button class="icon-btn" title="Modifica" onclick="window._startTaskEdit('${cid}','${tid}')">✏️</button>`
              : `<button class="icon-btn" title="Salva" onclick="window._saveTaskEdit('${cid}','${tid}')">💾</button>
                 <button class="icon-btn" title="Annulla" onclick="window._cancelEdit()">✕</button>`
            }
            <button class="icon-btn delete" title="Elimina" onclick="window._deleteTask('${cid}','${tid}')">🗑</button>
          </span>
          ${date ? `<span class="task-date">${date}</span>` : ''}
        </div>
      </div>`;

    const subtaskRows = subtasks.map(([sid, sub]) => renderSubtaskRow(cid, tid, sid, sub)).join('');

    const subPanel = `
      <div class="subtasks-panel" id="sub-panel-${tid}">
        <div class="subtasks-list" id="sublist-${tid}">
          ${subCount === 0
            ? `<div style="font-size:0.72rem;color:var(--muted);padding:0.2rem 0">Nessuna sub-task ancora.</div>`
            : subtaskRows
          }
        </div>
        <div class="add-subtask-row edit-only">
          <input type="text" id="sub-input-${tid}" placeholder="Nuova sub-task…"
                 onkeydown="if(event.key==='Enter') window._addSubtask('${cid}','${tid}')"/>
          <button class="btn-sub" onclick="window._addSubtask('${cid}','${tid}')">+ Sub-task</button>
        </div>
      </div>`;

    return `<div class="task-wrapper${isOpen?' has-subtasks-open':''}" id="wrap-${tid}">${taskRow}${subPanel}</div>`;
  }

  function renderSubtaskRow(cid, tid, sid, sub) {
    const isEditing = editingId?.type === 'subtask' && editingId?.sid === sid;
    const badgeCls  = { todo:'badge-todo', inprogress:'badge-inprogress', done:'badge-done', incomplete:'badge-incomplete', missingfiles:'badge-missingfiles' }[sub.status] || 'badge-todo';
    const label     = { todo:'Da fare', inprogress:'In corso', done:'Completata', incomplete:'Incompleto', missingfiles:'File mancanti' }[sub.status] || 'Da fare';

    return `
      <div class="subtask-item status-${sub.status||'todo'}" id="subtask-${sid}">
        <span class="subtask-arrow">↳</span>
        ${isEditing
          ? `<input class="subtask-name-edit" id="sedit-${sid}" value="${escHtml(sub.name)}"
                    onkeydown="if(event.key==='Enter') window._saveSubEdit('${cid}','${tid}','${sid}'); if(event.key==='Escape') window._cancelEdit()"/>`
          : `<span class="subtask-name">${escHtml(sub.name)}</span>`
        }
        <div class="task-meta">
          ${!isEditing ? `<span class="status-badge ${badgeCls}" style="font-size:0.58rem">${label}</span>` : ''}
          <select class="status-select" style="font-size:0.65rem;padding:0.22rem 0.45rem"
                  onchange="window._updateSubStatus('${cid}','${tid}','${sid}',this.value)">
            <option value="todo"         ${sub.status==='todo'         ?'selected':''}>Da fare</option>
            <option value="inprogress"   ${sub.status==='inprogress'   ?'selected':''}>In corso</option>
            <option value="done"         ${sub.status==='done'         ?'selected':''}>Completata</option>
            <option value="incomplete"   ${sub.status==='incomplete'   ?'selected':''}>Incompleto</option>
            <option value="missingfiles" ${sub.status==='missingfiles' ?'selected':''}>File mancanti</option>
          </select>
          <span class="edit-only" style="display:contents">
            ${!isEditing
              ? `<button class="icon-btn" style="font-size:0.75rem" title="Modifica" onclick="window._startSubEdit('${cid}','${tid}','${sid}')">✏️</button>`
              : `<button class="icon-btn" style="font-size:0.75rem" title="Salva" onclick="window._saveSubEdit('${cid}','${tid}','${sid}')">💾</button>
                 <button class="icon-btn" style="font-size:0.75rem" title="Annulla" onclick="window._cancelEdit()">✕</button>`
            }
            <button class="icon-btn delete" style="font-size:0.75rem" title="Elimina" onclick="window._deleteSubtask('${cid}','${tid}','${sid}')">🗑</button>
          </span>
        </div>
      </div>`;
  }

  // ── Accordion ───────────────────────────────────────────────
  window._toggleAccordion = function(tid) {
    const panel = document.getElementById(`sub-panel-${tid}`);
    const btn   = document.getElementById(`expand-btn-${tid}`);
    const wrap  = document.getElementById(`wrap-${tid}`);
    if (!panel) return;
    if (openAccordions.has(tid)) {
      openAccordions.delete(tid);
      panel.classList.remove('open');
      btn?.classList.remove('open');
      wrap?.classList.remove('has-subtasks-open');
    } else {
      openAccordions.add(tid);
      panel.classList.add('open');
      btn?.classList.add('open');
      wrap?.classList.add('has-subtasks-open');
      setTimeout(() => document.getElementById(`sub-input-${tid}`)?.focus(), 50);
    }
  };

  // ── CRUD ────────────────────────────────────────────────────
  window._addTask = async function(cid) {
    const inp = document.getElementById(`input-${cid}`);
    const name = inp.value.trim();
    if (!name) return;
    if (!db) { toast('⚠ Database non configurato'); return; }
    try {
      await window._fbPush(`tasks/${cid}`, { name, status:'todo', createdAt: Date.now() });
      inp.value = '';
      toast('Task aggiunta ✓');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._updateStatus = async function(cid, tid, status) {
    if (!db) return;
    try {
      await window._fbSet(`tasks/${cid}/${tid}/status`, status);
      toast('Stato aggiornato ✓');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._deleteTask = async function(cid, tid) {
    if (!db) return;
    const task = allTasks[cid]?.[tid];
    const subCount = task?.subtasks ? Object.keys(task.subtasks).length : 0;
    if (!confirm(subCount > 0 ? `Eliminare questa task e le sue ${subCount} sub-task?` : 'Eliminare questa task?')) return;
    try {
      await window._fbRemove(`tasks/${cid}/${tid}`);
      openAccordions.delete(tid);
      toast('Task eliminata');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._startTaskEdit = function(cid, tid) { editingId = { type:'task', cid, tid }; renderTasks(cid); };

  window._saveTaskEdit = async function(cid, tid) {
    const inp = document.getElementById(`tedit-${tid}`);
    if (!inp) return;
    const name = inp.value.trim(); if (!name || !db) return;
    try { await window._fbSet(`tasks/${cid}/${tid}/name`, name); editingId = null; toast('Task modificata ✓'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._addSubtask = async function(cid, tid) {
    const inp = document.getElementById(`sub-input-${tid}`);
    const name = inp.value.trim(); if (!name) return;
    if (!db) { toast('⚠ Database non configurato'); return; }
    try {
      await window._fbPush(`tasks/${cid}/${tid}/subtasks`, { name, status:'todo', createdAt: Date.now() });
      inp.value = ''; openAccordions.add(tid);
      toast('Sub-task aggiunta ✓');
    } catch(e) { toast('Errore: ' + e.message); }
  };

  window._updateSubStatus = async function(cid, tid, sid, status) {
    if (!db) return;
    try { await window._fbSet(`tasks/${cid}/${tid}/subtasks/${sid}/status`, status); toast('Stato aggiornato ✓'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._deleteSubtask = async function(cid, tid, sid) {
    if (!db) return;
    if (!confirm('Eliminare questa sub-task?')) return;
    try { await window._fbRemove(`tasks/${cid}/${tid}/subtasks/${sid}`); toast('Sub-task eliminata'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._startSubEdit = function(cid, tid, sid) { editingId = { type:'subtask', cid, tid, sid }; openAccordions.add(tid); renderTasks(cid); };

  window._saveSubEdit = async function(cid, tid, sid) {
    const inp = document.getElementById(`sedit-${sid}`);
    if (!inp) return;
    const name = inp.value.trim(); if (!name || !db) return;
    try { await window._fbSet(`tasks/${cid}/${tid}/subtasks/${sid}/name`, name); editingId = null; toast('Sub-task modificata ✓'); }
    catch(e) { toast('Errore: ' + e.message); }
  };

  window._cancelEdit = function() {
    const prev = editingId; editingId = null;
    if (prev) COMPANIES.forEach(c => { if (allTasks[c.id]?.[prev.tid]) renderTasks(c.id); });
  };

  // ── Utils ───────────────────────────────────────────────────
  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }


  // ── Seed SlabHub ────────────────────────────────────────────
  const SLABHUB_SEED = {
    'slabhub_gabriele': [
      { name: 'Nuove grafiche', status: 'todo' },
      { name: 'Copertine storie in evidenza', status: 'todo' },
      { name: 'Facebook Ads (con Valerio)', status: 'todo' },
      { name: 'Migliorare le collab', status: 'todo' },
      { name: 'Cercare fornitore cover', status: 'todo' },
      { name: 'Pensare a nuovi contenuti per presentare il prodotto in modo premium (basandosi sui contenuti esistenti)', status: 'todo' },
    ],
    'slabhub_davide': [
      { name: 'Contenuti nuovi (con Valerio)', status: 'todo' },
      { name: 'Storie su Instagram e TikTok', status: 'todo' },
      { name: 'Migliorare le collab', status: 'todo' },
      { name: 'Cercare fornitore cover', status: 'todo' },
      { name: 'Pensare a nuovi contenuti per presentare il prodotto in modo premium (basandosi sui contenuti esistenti)', status: 'todo' },
    ],
    'slabhub_valerio': [
      { name: 'Contenuti nuovi (con Davide)', status: 'todo' },
      { name: 'Sistemare nuovi prodotti', status: 'todo' },
      { name: 'Facebook Ads (con Gabriele)', status: 'todo' },
      { name: 'Migliorare le collab', status: 'todo' },
      { name: 'Cercare fornitore cover', status: 'todo' },
      { name: 'Pensare a nuovi contenuti per presentare il prodotto in modo premium (basandosi sui contenuti esistenti)', status: 'todo' },
    ],
  };

  async function seedSlabHub(db) {
    const { ref, get, push } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    for (const [cid, tasks] of Object.entries(SLABHUB_SEED)) {
      const snap = await get(ref(db, `tasks/${cid}`));
      if (snap.exists()) continue;
      for (const task of tasks) {
        await push(ref(db, `tasks/${cid}`), { ...task, createdAt: Date.now() });
      }
    }
  }

  // ── Boot ────────────────────────────────────────────────────
  const cfg = {
    apiKey: "AIzaSyAfy8G_pHz8DftywbYi4YX1k71EyrmOgxQ",
    authDomain: "gestionale-gabriele.firebaseapp.com",
    databaseURL: "https://gestionale-gabriele-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gestionale-gabriele",
  };
  initFirebase(cfg).then(() => {
    setTimeout(async () => { if (db) await seedSlabHub(db); }, 1500);
  });
</script>
